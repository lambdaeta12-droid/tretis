<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Survival: Rango de Intensidad</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body { background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        
        /* Contenedor para evitar que las cosas se monten */
        #main-layout { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 10px; }

        .menu { display: flex; gap: 10px; margin-bottom: 10px; z-index: 100; }
        button { padding: 12px 15px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 12px; }
        #btn-bluetooth { background: #0088ff; color: #fff; }
        #btn-start { background: #00ff88; color: #fff; }

        /* Estilo del Slider de Intensidad */
        #intensity-control { width: 90%; max-width: 300px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; margin-bottom: 10px; text-align: center; border: 1px solid #333; }
        #intensity-slider { width: 100%; height: 30px; cursor: pointer; accent-color: #00ff88; }
        #intensity-label { font-size: 14px; font-weight: bold; color: #0ff; margin-bottom: 5px; display: block; }

        #game-container { position: relative; border: 4px solid #333; border-radius: 10px; background: #000; }
        canvas { display: block; background: #000; width: 240px; height: 400px; }

        .stats { position: absolute; top: 10px; left: 10px; display: flex; gap: 8px; pointer-events: none; }
        .stat-box { background: rgba(0,0,0,0.85); padding: 4px 10px; border-radius: 8px; border: 1px solid #444; font-size: 12px; text-align: center; }
        #val-speed { color: #00ff88; font-weight: bold; }
        #effort-display { color: #ffeb3b; font-weight: bold; }

        #camera-preview { position: fixed; bottom: 10px; right: 10px; width: 80px; height: 60px; border: 2px solid #0ff; border-radius: 8px; overflow: hidden; opacity: 0.6; z-index: 50; }
        #input_video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        #status-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: bold; color: #ffeb3b; z-index: 1000; display: none; }

        .pulse-point { animation: point-glow 0.4s ease-out; }
        @keyframes point-glow { 0% { transform: scale(1); } 50% { transform: scale(1.3); color: #00ff88; } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="status-overlay">
        <div id="status-text">Iniciando Cámara...</div>
    </div>

    <div id="main-layout">
        <div class="menu">
            <button id="btn-bluetooth" onclick="connectElliptical()">🔗 VINCULAR</button>
            <button id="btn-start" onclick="startGame()">▶️ INICIAR</button>
        </div>

        <div id="intensity-control">
            <span id="intensity-label">ESFUERZO ELÍPTICA: <span id="effort-val-text">1</span></span>
            <input type="range" id="intensity-slider" min="1" max="16" value="1" step="1">
        </div>

        <div id="game-container">
            <div id="countdown"></div>
            <canvas id="tetris" width="240" height="400"></canvas>
            <div class="stats">
                <div class="stat-box">PTS<br><span id="score">0</span></div>
                <div class="stat-box">MAX<br><span id="high-score">0</span></div>
                <div class="stat-box">VEL<br><span id="val-speed">0.0</span></div>
                <div class="stat-box">X<span id="effort-display">1</span></div>
            </div>
        </div>
    </div>

    <div id="camera-preview"> <video id="input_video"></video> </div>

<script>
/* ==========================================
   1. VARIABLES DE INTENSIDAD (NUEVO)
   ========================================== */
let effortMultiplier = 1;
const intensitySlider = document.getElementById('intensity-slider');
const effortValText = document.getElementById('effort-val-text');
const effortDisplay = document.getElementById('effort-display');

intensitySlider.addEventListener('input', () => {
    effortMultiplier = parseInt(intensitySlider.value);
    effortValText.innerText = effortMultiplier;
    effortDisplay.innerText = effortMultiplier;
});

/* ==========================================
   2. LÓGICA TETRIS
   ========================================== */
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
context.scale(20, 20);

const pieces = 'ILJOTSZ';
const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
const arena = createMatrix(12, 20);
const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

let dropCounter = 0;
let dropInterval = 200; 
let lastTime = 0;
let gameRunning = false;
let highScore = 0; 

function createMatrix(w, h) {
    const m = [];
    while (h--) m.push(new Array(w).fill(0));
    return m;
}

function createPiece(type) {
    if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
    if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
    if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
    if (type === 'O') return [[4,4],[4,4]];
    if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
    if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
    if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
}

function playerReset() {
    player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    if (collide(arena, player)) {
        arena.forEach(row => row.fill(0));
        player.score = 0;
        document.getElementById('score').innerText = "0";
    }
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
        }
    }
    return false;
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
        });
    });
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
    }
    dir > 0 ? matrix.forEach(row => row.reverse()) : matrix.reverse();
}

function playerRotate(dir) {
    rotate(player.matrix, dir);
    if (collide(arena, player)) rotate(player.matrix, -dir);
}

// MODIFICADO: Ahora suma puntos según el esfuerzo
function arenaSweep() {
    let rowCount = 0;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) continue outer;
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;
        rowCount++;
    }

    if (rowCount > 0) {
        // Lógica de puntos: Multiplicamos el esfuerzo por las líneas hechas
        player.score += rowCount * effortMultiplier;
        
        const s = document.getElementById('score');
        if (s) {
            s.innerText = player.score;
            s.classList.remove('pulse-point');
            void s.offsetWidth; 
            s.classList.add('pulse-point');
        }
        if (player.score > highScore) {
            highScore = player.score;
            document.getElementById('high-score').innerText = highScore;
        }
    }
}

function draw() {
    context.fillStyle = '#000';
    context.fillRect(0, 0, canvas.width, canvas.height);
    drawMatrix(arena, {x: 0, y: 0});
    drawMatrix(player.matrix, player.pos);
}

function drawMatrix(matrix, offset) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                context.fillStyle = colors[value];
                context.fillRect(x + offset.x, y + offset.y, 1, 1);
            }
        });
    });
}

function update(time = 0) {
    if (!gameRunning) return;
    const deltaTime = time - lastTime;
    lastTime = time;
    dropCounter += deltaTime;
    if (dropCounter > dropInterval) {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
        }
        dropCounter = 0;
    }
    draw();
    requestAnimationFrame(update);
}

function startGame() {
    const cd = document.getElementById('countdown');
    let count = 3;
    gameRunning = false; 
    arena.forEach(row => row.fill(0));
    player.score = 0;
    document.getElementById('score').innerText = "0";
    playerReset();
    draw();

    cd.style.display = 'block';
    cd.innerText = count;

    const timer = setInterval(() => {
        count--;
        if (count > 0) {
            cd.innerText = count;
        } else {
            clearInterval(timer);
            cd.style.display = 'none';
            gameRunning = true;
            lastTime = performance.now();
            update();
            document.getElementById('btn-start').innerText = "REINICIAR";
        }
    }, 1000);
}

/* ==========================================
   3. CONTROL IA (ROSTRO)
   ========================================== */
let isCalibrated = false;
let neutralX = 0;
let lastGesture = 0;
let readyToRotate = true;

const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });

faceMesh.onResults(results => {
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
    const landmarks = results.multiFaceLandmarks[0];
    const nose = landmarks[6];

    if (!isCalibrated) { 
        neutralX = nose.x; 
        isCalibrated = true; 
        document.getElementById('status-overlay').style.display = 'none'; 
        return; 
    }

    if (!gameRunning) return;

    const now = Date.now();
    const diffX = nose.x - neutralX;
    const mouthGap = Math.abs(landmarks[13].y - landmarks[14].y);

    if (now - lastGesture > 200) {
        if (diffX > 0.05) { 
            player.pos.x--;
            if (collide(arena, player)) player.pos.x++;
            lastGesture = now;
        } 
        else if (diffX < -0.05) { 
            player.pos.x++;
            if (collide(arena, player)) player.pos.x--;
            lastGesture = now;
        }
    }

    const faceSize = Math.abs(landmarks[10].y - landmarks[152].y);
    const dynamicThreshold = faceSize * 0.20; 

    if (mouthGap > dynamicThreshold) { 
        if (readyToRotate) {
            playerRotate(1);
            readyToRotate = false; 
        }
    } else if (mouthGap < (dynamicThreshold * 0.5)) {
        readyToRotate = true; 
    }
});

const camera = new Camera(document.getElementById('input_video'), {
    onFrame: async () => await faceMesh.send({image: document.getElementById('input_video')}),
    width: 480, height: 360
});
camera.start();

/* ==========================================
   4. BLUETOOTH
   ========================================== */
async function connectElliptical() {
    const btn = document.getElementById('btn-bluetooth');
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ services: [0x1826] }, { services: [0x1816] }]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(0x1826);
        const characteristic = await service.getCharacteristic(0x2AD2);
        
        await characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged', (e) => {
            const data = e.target.value;
            let rawVal = data.getUint16(2, true); 
            let speed = rawVal / 100; 

            // LÓGICA DE RANGOS DE 5 EN 5 (Basado en velocidad real)
            if (speed < 5) dropInterval = 50;
            else if (speed < 10) dropInterval = 100;
            else if (speed < 15) dropInterval = 150;
            else if (speed < 20) dropInterval = 200;
            else if (speed < 25) dropInterval = 300;
            else if (speed < 30) dropInterval = 400;
            else if (speed < 35) dropInterval = 600;
            else if (speed < 40) dropInterval = 700;
            else if (speed < 45) dropInterval = 800;
            else dropInterval = 900;

            // Mostrar con 1 decimal para que coincida con tu máquina
            document.getElementById('val-speed').innerText = speed.toFixed(1);
        });

        btn.innerText = "✅ CONECTADO";
        btn.style.background = "#333";
    } catch (e) { 
        console.error(e);
        alert("Error de conexión"); 
    }
}
</script>
</body>
</html>
